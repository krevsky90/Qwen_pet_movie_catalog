name: CI Pipeline

on:
  push:
    branches: [ master, sprint5_cicd_tests_health_docker_metrics_swagger ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Check secrets are configured
        run: |
          if [ -z "$EXTERNAL_OMDB_API_KEY" ]; then
            echo "Error: OMDB_API_KEY secret is not configured!"
            echo "Please add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "OMDB_API_KEY is configured"
        env:
          EXTERNAL_OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}

      - name: Run tests
        run: ./gradlew test --console=plain --info
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          # secrets (take from github)
          EXTERNAL_OMDB_API_KEY:  ${{ secrets.OMDB_API_KEY }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()  # ← Загружать даже если тесты упали!
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7  # Хранить 7 дней
          if-no-files-found: warn

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7
          if-no-files-found: warn

      - name: Generate JaCoCo Report
        run: ./gradlew jacocoTestReport

      - name: Upload coverage reports to codecov
        uses: codecov/codecov-action@v3
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false  # Не ломать пайплайн, если загрузка поиска покрытия тестами для некого файла упала
          verbose: true            # Подробные логи для отладки
          name: codecov-umbrella  # Опционально: имя отчёта