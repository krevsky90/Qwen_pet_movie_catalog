spring.application.name=Qwen_pet_movie_catalog

spring.datasource.url=jdbc:postgresql://localhost:5432/movie_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.hibernate.ddl-auto=update

#Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

#cache properties
app.cache.ttl.movies-default=10m
app.cache.global_prefix=movie:
app.cache.ttl.movies-by-id=10m
app.cache.ttl.movies-list=5m
app.cache.ttl.movies-search=5m
