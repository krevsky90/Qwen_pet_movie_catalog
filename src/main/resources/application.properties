
spring.application.name=Qwen_pet_movie_catalog

# OMDb
external.omdb.base-url=https://www.omdbapi.com

# Logging
logging.level.com.krev.qwen_pet_movie_catalog.external=INFO
logging.level.feign=INFO
logging.level.io.github.openfeign=INFO
logging.level.io.github.resilience4j=INFO
logging.level.io.github.resilience4j.circuitbreaker=INFO
logging.level.io.github.resilience4j.retry=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

# App info
info.app.name=Pet Movie Catalog API
info.app.description=Pet project for learning Spring Boot
info.app.version=1.0.0