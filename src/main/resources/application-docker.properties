# we can define variable and its default value
# it helps us to override these variables (DB_HOST, DB_NAME) in docker-compose file (environment properties)
spring.datasource.url=jdbc:postgresql://{DB_HOST:postgres}:5432/${DB_NAME:movie_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# Safe settings for Docker
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
# it adds existing DB schema (if it exists) as v1 in flyway_schema_history
# it is useful for cases when schema was created before flyway was introduced to the project
spring.flyway.baseline-on-migrate=true

#Redis
spring.data.redis.host=${REDIS_HOST:movie-redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Cache properties
app.cache.ttl.movies-default=10m
app.cache.global_prefix=movie:
app.cache.ttl.movies-by-id=10m
app.cache.ttl.movies-list=5m
app.cache.ttl.movies-search=5m

# OMDb API
# take api key from .env container. NOTE: NO default value! FAILS immediately if key is not set
external.omdb.api-key=${EXTERNAL_OMDB_API_KEY}
external.omdb.base-url=${EXTERNAL_OMDB_BASE_URL:https://www.omdbapi.com}

# Logging (less details than locally)
logging.level.com.krev.qwen_pet_movie_catalog.external=INFO
logging.level.feign=INFO
logging.level.io.github.openfeign=INFO
logging.level.io.github.resilience4j=INFO
logging.level.io.github.resilience4j.circuitbreaker=INFO
logging.level.io.github.resilience4j.retry=INFO

# Resilience4j
resilience4j.circuitbreaker.instances.omdbApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.omdbApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.omdbApi.wait-duration-in-open-state=10s
resilience4j.retry.instances.omdbApi.max-attempts=3
resilience4j.retry.instances.omdbApi.wait-duration=1s
resilience4j.retry.instances.omdbApi.retry-exceptions[0]=feign.RetryableException
resilience4j.retry.instances.omdbApi.retry-exceptions[1]=java.net.UnknownHostException
resilience4j.retry.instances.omdbApi.retry-exceptions[2]=java.net.ConnectException
resilience4j.retry.instances.omdbApi.retry-exceptions[3]=java.io.IOException
resilience4j.retry.instances.omdbApi.retry-exceptions[4]=java.lang.RuntimeException