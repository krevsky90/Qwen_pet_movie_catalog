spring.datasource.url=jdbc:postgresql://localhost:5432/movie_test_db
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver
# DB for tests is created manually or in container
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Cache properties (let's reduce TTL for fast testing)
app.cache.ttl.movies-default=1s
app.cache.global_prefix=movie:
app.cache.ttl.movies-by-id=1s
app.cache.ttl.movies-list=1s
app.cache.ttl.movies-search=1s

# OMDb API (fake api key for tests)
external.omdb.api-key=test-key
# NOTE: also can be mocked via WireMock
external.omdb.base-url=http://localhost:12345

# Logging (less details than it is in local mode)
logging.level.com.krev.qwen_pet_movie_catalog.external=INFO
logging.level.feign=INFO
logging.level.io.github.openfeign=INFO
logging.level.io.github.resilience4j=INFO
logging.level.io.github.resilience4j.circuitbreaker=INFO
logging.level.io.github.resilience4j.retry=INFO